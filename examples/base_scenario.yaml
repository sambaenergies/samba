# SAMBA v1 — Base Scenario Reference Example
# schema_version: "1.0"
#
# This file demonstrates every available field.  Copy it, strip the fields
# you do not need, and adjust values for your project.
#
# Units and conventions:
#   - All rates / fractions:  decimal  (0.08 = 8%, NOT 8.0)
#   - All powers:             kilowatts (kW)
#   - All energies:           kilowatt-hours (kWh)
#   - All costs:              local currency (see project.currency)
#   - capacity_kw / capacity_kwh = null → design variable (solver optimises size)
#   - capacity_kw / capacity_kwh = <float> → fixed size (not a design variable)

schema_version: "1.0"

# ---------------------------------------------------------------------------
# Project
# ---------------------------------------------------------------------------
project:
  name: "SAMBA Demo — Off-grid Solar + Storage + Diesel"

  # Calendar year used for tariff escalation calculations
  year: 2025                         # int; any positive year

  # Economic horizon
  lifetime_years: 25                 # int in [1, 40]

  # Discount rates — nominal (not real); to get real: r_real ≈ r_nom − r_inf
  discount_rate_nominal: 0.08        # float in [0, 1]
  inflation_rate: 0.03               # float in [0, 1]; 0 = no inflation adjustment

  # Renewable Energy incentive applied to PV + battery capex (e.g. 30 % ITC)
  re_incentive_rate: 0.0             # float in [0, 1); 0 = no incentive

  # Hard capital budget limit (null = unconstrained)
  budget: null                       # float > 0, or null

  # Display label only — does not affect any computation
  currency: "USD"

  # Year index at which initial investment occurs (0 = start of Year 1)
  capex_year: 0                      # int >= 0

# ---------------------------------------------------------------------------
# Location
# ---------------------------------------------------------------------------
location:
  latitude: 37.77                    # float in [-90, 90]; negative = southern hemisphere
  longitude: -122.42                 # float in [-180, 180]; negative = west of prime meridian
  altitude_m: 32.0                   # float; metres above sea level
  timezone: "America/Los_Angeles"    # IANA timezone string (https://www.iana.org/time-zones)

# ---------------------------------------------------------------------------
# Weather
# ---------------------------------------------------------------------------
weather:
  # source options:
  #   "csv"   — load from a local CSV file (columns: GHI, DHI, DNI, Temp, WindSpeed)
  #   "nsrdb" — fetch from NREL NSRDB API (requires API key)
  source: "csv"
  csv_path: "content/weather_sf_2019.csv"              # relative or absolute path; required for source="csv"
  # nsrdb_api_key: null                       # string; required only when source="nsrdb"

# ---------------------------------------------------------------------------
# Load
# ---------------------------------------------------------------------------
load:
  # source options:
  #   "hourly_csv"             — 8760-row CSV, one kW value per hour
  #   "daily_csv"              — 24-row CSV (hourly kW); repeated for all 365 days
  #   "monthly_total"          — 12 monthly kWh totals expanded via daily distribution
  #   "monthly_hourly_average" — 12×24 matrix CSV expanded to 8760 h
  #   "annual_hourly_average"  — 8760-row average profile scaled to annual total
  #   "annual_daily_average"   — 24-row daily average repeated to 8760 h
  #   "generic_monthly"        — monthly peak kW drives the generic_load algorithm
  #   "generic_annual"         — annual kWh + monthly_peak list drives generic_load
  #   "generic_annual_total"   — single annual kWh total; generic_load flat profile
  #   "generic"                — fully parameterised generic_load call
  source: "hourly_csv"
  csv_path: "content/load_residential_8760.csv"              # required for all *_csv and *_hourly_average sources

  # Multiply every value by this factor after loading (1.0 = no scaling)
  scale_factor: 1.0

  # Optional — required only for certain generic_* sources
  # daily_profile: null        # list of exactly 24 float values (kWh per hour)
  # monthly_peak: null         # list of exactly 12 float values (kW)

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  # -- PV array --------------------------------------------------------------
  pv:
    enabled: true
    capacity_kw: null                # null = design variable (solver picks optimal size)
    capex_per_kw: 900.0              # float; installed cost per kW (currency from project)
    opex_per_kw_yr: 15.0             # float; annual O&M cost per kW
    lifetime_years: 25               # int; replacement trigger in cash-flow model
    derating_factor: 0.90            # float in (0, 1]; accounts for soiling, wiring, mismatch
    tilt_deg: 15.0                   # float in [0, 90]; panel tilt from horizontal
    azimuth_deg: 0.0                 # float in [0, 360]; 0/360 = North, 180 = South
    module_type: "monofacial"        # "monofacial" | "bifacial"
    noct_celsius: 45.0               # float; Nominal Operating Cell Temperature
    temp_coeff_pmax: -0.004          # float per °C; typically -0.003 to -0.005

  # -- Battery storage -------------------------------------------------------
  battery:
    enabled: true
    capacity_kwh: null               # null = design variable
    power_kw: null                   # null = derived from capacity at runtime (c_rate × capacity)
    chemistry: "li_ion"              # "li_ion" (GenericStorage) | "kibam" (KiBaM model, Phase 16)
    capex_per_kwh: 350.0             # float; installed cost per kWh of usable capacity
    opex_per_kwh_yr: 5.0             # float; annual O&M per kWh
    lifetime_years: 10               # int; replacement trigger
    soc_min: 0.20                    # float in [0, 1]; minimum state of charge (depth-of-discharge)
    soc_max: 1.00                    # float in [0, 1]; maximum state of charge; soc_min < soc_max
    soc_initial: 0.50                # float in [0, 1]; state of charge at hour 0
    charge_efficiency: 0.95          # float in (0, 1]; one-way charge efficiency
    discharge_efficiency: 0.95       # float in (0, 1]; one-way discharge efficiency
    c_rate_charge: 0.50              # float > 0; max charge rate as fraction of capacity per hour
    c_rate_discharge: 0.50           # float > 0; max discharge rate as fraction of capacity per hour

  # -- Wind turbine ----------------------------------------------------------
  # wind_turbine:
  #   enabled: true
  #   count: 1                       # int > 0; fixed number of units in v1
  #   turbine_model: "Enercon_E33_330kW"  # string; must match an entry in the power-curve table
  #   hub_height_m: 50.0             # float > 0
  #   capex_per_unit: 450000.0       # float; total installed cost per turbine
  #   opex_per_unit_yr: 10000.0      # float; annual O&M per turbine
  #   lifetime_years: 20             # int

  # -- Diesel generator ------------------------------------------------------
  diesel_generator:
    enabled: true
    capacity_kw: 30.0                # float > 0; FIXED in v1 (not a design variable)
    capex_per_kw: 400.0              # float
    opex_per_kw_yr: 20.0             # float; annual O&M per kW of rated capacity
    lifetime_years: 15               # int
    fuel_price_per_l: 1.20           # float; price per litre (currency from project)
    fuel_lhv_kwh_per_l: 9.9         # float; Lower Heating Value of diesel
    slope_l_per_kwh: 0.246           # float; fuel-curve slope (litres per kWh output)
    intercept_l_per_kw_hr: 0.084     # float; fuel-curve intercept (fraction of rated capacity)
    min_load_fraction: 0.0           # float in [0, 1]; minimum stable generation as fraction of rated

  # -- Inverter --------------------------------------------------------------
  inverter:
    capacity_kw: null                # null = design variable
    capex_per_kw: 200.0              # float
    opex_per_kw_yr: 5.0              # float
    lifetime_years: 10               # int
    efficiency: 0.96                 # float in (0, 1]

  # -- Grid connection -------------------------------------------------------
  # null = off-grid (no grid connection).  Set to a mapping to enable grid.
  # grid:
  #   enabled: true
  #   capacity_kw: 100.0             # float > 0; maximum import power
  #   export_allowed: false          # bool; set true to enable feed-in; requires tariff.sell
  #   export_capacity_kw: 0.0        # float; maximum export power (relevant if export_allowed)
  #   capex: 0.0                     # float; one-off connection cost
  #   opex_yr: 0.0                   # float; annual grid standing charge

# ---------------------------------------------------------------------------
# Tariff
# ---------------------------------------------------------------------------
tariff:
  # -- Buy rate (electricity purchased / notional price signal) --------------
  buy:
    # type options:
    #   "flat"           — single rate_per_kwh
    #   "tou"            — time-of-use via tou_schedule
    #   "tiered"         — consumption tiers via tiers list
    #   "seasonal"       — different flat rates per season
    #   "seasonal_tiered"— tiered rates per season
    #   "monthly"        — 12 distinct flat monthly rates
    #   "monthly_tiered" — 12 distinct tiered schedules
    #   "ul_tou"         — uncapped TOU (same structure as "tou")
    type: "flat"
    rate_per_kwh: 0.00               # float; set to 0 for off-grid (no buying from grid)

  # -- Sell rate (feed-in tariff) — omit when grid.export_allowed = false ----
  # sell:
  #   type: "flat"                   # "flat" | "tou"
  #   rate_per_kwh: 0.05             # float; required when type="flat"

  # -- Monthly service / standing charge ------------------------------------
  # service_charge:
  #   type: "flat"                   # "flat" | "tiered_kwh"
  #   monthly_flat: 10.00            # float; required when type="flat"

# ---------------------------------------------------------------------------
# Constraints
# ---------------------------------------------------------------------------
constraints:
  # All constraints are HARD limits; infeasible solutions are rejected.

  # Minimum share of annual load energy that must come from renewables (0 = unconstrained)
  min_renewable_fraction: 0.0        # float in [0, 1]

  # Maximum annual diesel consumption in litres (null = unconstrained)
  max_annual_diesel_l: null          # float > 0, or null

  # Maximum annual equivalent full cycles for the battery (null = unconstrained)
  max_battery_cycles_yr: null        # float > 0, or null

  # Loss of Power Supply Probability ceiling (0 = no unmet demand allowed)
  max_lpsp: 0.05                     # float in [0, 1]

  # If true, treat as off-grid even when a grid component is defined (useful for sensitivity)
  force_grid_disconnect: false       # bool

# ---------------------------------------------------------------------------
# Objective
# ---------------------------------------------------------------------------
objective:
  # v1 only supports NPC (Net Present Cost) minimisation.
  # Future versions will add "lcoe", "co2", "multi_objective".
  type: "cost"                       # Literal["cost"]
