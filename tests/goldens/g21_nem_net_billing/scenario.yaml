# SAMBA Golden g21 — Grid + PV with NEM net-billing reconciliation (v4)
# Exercises monthly $0-floored bills with export-credit carryover.
schema_version: "4.0"
project:
  name: "g21 — NEM net-billing"
  year: 2013
  lifetime_years: 25
  discount_rate_nominal: 0.045
  inflation_rate: 0.02
  currency: "USD"
location:
  latitude: 37.77
  longitude: -122.42
  altitude_m: 0.0
  timezone: "America/Los_Angeles"
weather:
  source: "csv"
  csv_path: "../../../examples/content/weather_sf_2019.csv"
load:
  source: "hourly_csv"
  csv_path: "../../../examples/content/load_residential_8760.csv"
  scale_factor: 5.0
components:
  pv:
    enabled: true
    capacity_kw: 30.0
    capex_per_kw: 1100.0
  inverter:
    capacity_kw: 30.0
    capex_per_kw: 300.0
  grid:
    capacity_kw: 100.0
    export_allowed: true
    export_capacity_kw: 50.0
tariff:
  buy: { type: "flat", rate_per_kwh: 0.25 }
  sell: { type: "flat", rate_per_kwh: 0.08 }
  nem: { mode: "net_billing", carryover: true, annual_excess_credit_fraction: 0.0 }
