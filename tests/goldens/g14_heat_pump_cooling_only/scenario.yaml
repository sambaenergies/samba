# SAMBA Golden Scenario g14 — Heat Pump Cooling-Only
#
# PURPOSE: COP cooling validation + psychrometric T_iwb check.
#          HP satisfies constant 4 kW_th cooling demand with zero unmet load.
#
# Topology: Grid (20 kW) + HP (cooling_only, catalog_auto) + Inverter
# Year:     2023
#
# Thermal load: constant 4 kW_th × 8760 h = 35 040 kWh_th/yr
# Electricity: flat $0.12/kWh
#
# Key invariants:
#   - annual_cool_produced_kwh ≈ 35 040 kWh_th (4 kW × 8760 h)
#   - thermal_lpsp_cooling = 0.0
#   - mean_cop_cooling > 1.0 (catalog COP in temperate climate)

schema_version: "2.0"

project:
  name: "g14 — HP Cooling-Only (4 kW constant load, flat $0.12)"
  year: 2023
  lifetime_years: 15
  discount_rate_nominal: 0.06
  inflation_rate: 0.02
  re_incentive_rate: 0.0
  grid_escalation_rate: 0.0
  budget: null
  currency: "USD"
  capex_year: 0

location:
  latitude: 37.77
  longitude: -122.42
  altitude_m: 0.0
  timezone: "America/Los_Angeles"

weather:
  source: "csv"
  csv_path: "../../../examples/content/weather_sf_2019.csv"

load:
  source: "generic_annual_total"
  annual_kwh: 5000.0
  peak_month: "July"
  thermal:
    enabled: true
    source: "csv"
    cooling_csv_path: "cooling_4kw.csv"   # 8760 rows, constant 4.0 kW_th

components:

  inverter:
    capacity_kw: null
    capex_per_kw: 314.0
    opex_per_kw_yr: 0.0
    lifetime_years: 25
    efficiency: 0.96

  grid:
    enabled: true
    capacity_kw: 20.0
    export_allowed: false
    capex: 0.0
    opex_yr: 0.0

  heat_pump:
    enabled: true
    mode: "cooling_only"
    sizing: "catalog_auto"
    cop_source: "catalog"
    capex: 3500.0
    opex_per_year: 120.0
    lifetime_years: 15

tariff:
  buy:
    type: "flat"
    rate_per_kwh: 0.12

  service_charge:
    type: "flat"
    monthly_flat: 10.0

constraints:
  max_lpsp: 0.001
  thermal_lpsp_max: 0.0

objective:
  type: "cost"
