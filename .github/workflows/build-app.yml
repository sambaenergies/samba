name: Build App

# Per-OS build matrix for the SAMBA desktop app: freeze the backend, verify it
# solves, then bundle the Tauri app. Runs manually (workflow_dispatch) for
# iteration, and on a `ui-vX.Y.Z` tag to cut a draft GitHub release with the
# bundles attached. (The samba-core PyPI release uses `vX.Y.Z` tags -- distinct.)

on:
  workflow_dispatch: {}
  push:
    tags:
      - "ui-v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build app (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: samba-server
            # AppImage is excluded: its linuxdeploy step cannot resolve the
            # ~440 MB frozen-Python payload (hundreds of bundled .so files).
            # deb + rpm cover the major distros. See the AppImage follow-up issue.
            bundle_args: "--bundles deb,rpm"
          - os: macos-14
            target: aarch64-apple-darwin
            bin: samba-server
            bundle_args: ""
          # macOS x86_64 (Intel) is intentionally dropped: GitHub's `macos-13`
          # runners are chronically unavailable (queued >1h, never scheduled),
          # and a stuck cell would block the release via `needs: build`. Apple
          # Silicon covers current Macs. Re-add a `macos-13` cell (or a
          # self-hosted Intel runner) here if availability returns.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: samba-server.exe
            bundle_args: ""

    steps:
      - uses: actions/checkout@v7

      - name: Check tag matches app version
        # On a ui-v* tag, fail fast (before the expensive freeze/build) if the
        # tag version doesn't match tauri.conf.json -- otherwise the release
        # title says one version while the bundle filenames say another.
        if: startsWith(github.ref, 'refs/tags/ui-v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#ui-v}"
          conf_version=$(jq -r .version ui/src-tauri/tauri.conf.json)
          if [ "$tag_version" != "$conf_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($tag_version) != tauri.conf.json version ($conf_version); bump tauri.conf.json"
            exit 1
          fi
          echo "tag matches app version: $conf_version"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install backend deps
        run: uv sync --all-extras

      - name: Freeze backend (PyInstaller)
        shell: bash
        run: |
          uv run pyinstaller --noconfirm --clean \
            --distpath packaging/dist --workpath packaging/build \
            packaging/samba-server.spec

      - name: Verify the frozen backend solves
        shell: bash
        run: uv run python scripts/verify_sidecar.py "packaging/dist/samba-server/${{ matrix.bin }}"

      - name: Stage backend into Tauri resources
        shell: bash
        run: |
          rm -rf ui/src-tauri/binaries/samba-server
          mkdir -p ui/src-tauri/binaries
          cp -R packaging/dist/samba-server ui/src-tauri/binaries/samba-server
          # Tauri's resource copy can strip the exec bit on Unix; restore it.
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "ui/src-tauri/binaries/samba-server/${{ matrix.bin }}"
          fi

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        working-directory: ui
        run: npm ci

      - name: Build the app
        working-directory: ui
        run: |
          npm run gen:types
          npx tauri build --target ${{ matrix.target }} ${{ matrix.bundle_args }}

      - name: List bundle output
        if: always()
        shell: bash
        run: ls -lR "ui/src-tauri/target/${{ matrix.target }}/release/bundle" || true

      - name: Upload app artifacts
        uses: actions/upload-artifact@v7
        with:
          name: samba-app-${{ matrix.target }}
          path: ui/src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error

  release:
    name: Draft release
    # Only on a ui-v* tag (not on workflow_dispatch). Requires every build cell
    # to succeed -- don't cut a release missing a platform.
    if: startsWith(github.ref, 'refs/tags/ui-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true # left as a draft for a human to review + publish
          name: SAMBA Desktop ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
          body: |
            **Unsigned desktop build.** macOS and Windows show a first-launch
            warning (Gatekeeper / SmartScreen) — see the
            [install instructions](https://github.com/sambaenergies/samba/blob/main/docs/desktop-app.md)
            for how to get past it and install on each OS.

            Platforms: Linux (`.deb` / `.rpm`), Windows (`.exe` / `.msi`),
            macOS Apple Silicon (`.dmg`). Each bundle embeds the SAMBA backend —
            no Python install required. (Intel macOS is not built; see the repo's
            build-app workflow notes.)
