name: CI

# Unified gate: CI runs the exact same `just` recipes developers run locally, so
# the pipeline cannot drift from `just check` / `just ui-check` / `just test`.
# `just` is installed via uv (the `rust-just` distribution) — no extra toolchain.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check (ruff + mypy + schema drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: just check
        run: uvx --from rust-just just check

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          - os: windows-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: uv sync --all-extras

      # `just test` body, run directly to stay portable on the Windows runner
      # (avoids relying on a POSIX shell for the recipe).
      - name: Test
        run: uv run pytest

  ui:
    name: UI (just ui-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install uv (for just)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # just ui-check: gen:types drift gate + eslint + vue-tsc + vitest
      - name: just ui-check
        run: uvx --from rust-just just ui-check

  ui-external:
    # Prove the virtual split structurally: build the UI web/contract layer from a
    # copy of ui/ placed where NO Python source and NO repo-root schemas/ exist
    # above it. It passes only because ui/contract/ is self-contained; a residual
    # reach-through fails hard with nothing to reach. SCOPE: this validates the
    # JS/web/contract layer ONLY -- ui/src-tauri (the Rust crate still embeds
    # Command::new("samba") and a localhost CSP) is under the deferred product
    # boundary and is intentionally NOT cargo-built in isolation here. The in-tree
    # `ui` job above remains the same-tree drift gate (ui/contract vs backend export).
    name: UI external-consumer build (isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Fast-fail reach-through guard. The real guarantee is the isolated build
      # below; this just gives a quick, clear error if a build input imports/aliases
      # above ui/ (other than the in-ui ui/contract/) or references the backend.
      - name: Reach-through guard
        run: |
          files=$(git ls-files 'ui/src/**' 'ui/scripts/**' 'ui/vite.config.*' 'ui/tsconfig*.json' 'ui/package.json')
          hits=$(grep -rnE '\.\./\.\.|/schemas/|samba_service' $files | grep -vE '/generated/|\.\./\.\./contract/' || true)
          if [ -n "$hits" ]; then
            echo "::error::UI reach-through detected. UI build inputs must stay within ui/ (ui/contract/ is the only allowed escape). The ui-external build below is the real guarantee; this grep is fast-fail UX."
            echo "$hits"
            exit 1
          fi
          if grep -q '"\.\.", "\.\.", "schemas"' ui/scripts/gen-types.mjs; then
            echo "::error::gen-types.mjs reaches repo-root ../../schemas; it must read ui/contract/."
            exit 1
          fi

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      # Copy ui/ (which contains ui/contract/) to a temp dir with no backend above it.
      - name: Copy ui/ to an isolated directory
        run: rsync -a --exclude node_modules --exclude dist ui/ "$RUNNER_TEMP/ui-external/"

      - name: Build the UI as an external consumer
        working-directory: ${{ runner.temp }}/ui-external
        run: |
          npm ci
          npm run gen:types
          npm run build
          npm run test

  compat-ui:
    # A backend contract change must not silently break a shape the UI consumes.
    # Generate types for the BASELINE UI (the base branch's ui/) from THIS PR's
    # vendored contract and typecheck it: a vue-tsc error means the PR's backend
    # shape change broke the baseline UI. Baseline = base branch ui/ (the current
    # committed UI). NOTE: once a UI release is tagged with the ui/contract/ setup,
    # prefer that tag as a stricter baseline -- v5.3.1 predates ui/contract/ so it
    # is not usable here yet. PR-only (needs a base ref).
    name: UI compatibility (baseline UI vs PR contract)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Typecheck the baseline UI against this PR's contract
        run: |
          base="origin/${{ github.base_ref }}"
          git worktree add /tmp/base-ui "$base"
          # Overlay this PR's vendored contract (drift-gated == a fresh export) onto
          # the baseline UI, then regenerate its types and typecheck.
          rm -f /tmp/base-ui/ui/contract/*.schema.json
          cp -f ui/contract/openapi.json ui/contract/manifest.json ui/contract/*.schema.json /tmp/base-ui/ui/contract/
          cd /tmp/base-ui/ui
          npm ci
          npm run gen:types
          npx vue-tsc --noEmit

  contract-breaking:
    # Fail on a BREAKING openapi.json change unless the data/schema contract major
    # (CONTRACT_VERSION in samba_service/_contract.py -- NOT the FastAPI app/info
    # version) was bumped. oasdiff runs as a CI-only GitHub Action (no local install,
    # per workstation-configs). Baseline = base branch openapi.json (catches per-PR
    # regressions; a last-release tag would be stricter once UI releases are tagged).
    # PR-only (needs a base ref).
    name: Contract breaking-change check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve base openapi + CONTRACT_VERSION majors
        id: base
        run: |
          base="origin/${{ github.base_ref }}"
          git show "$base:openapi.json" > /tmp/base-openapi.json
          pr_cv=$(grep -oP 'CONTRACT_VERSION = "\K[^"]+' samba_service/_contract.py)
          base_cv=$(git show "$base:samba_service/_contract.py" | grep -oP 'CONTRACT_VERSION = "\K[^"]+')
          echo "pr_major=${pr_cv%%.*}" >> "$GITHUB_OUTPUT"
          echo "base_major=${base_cv%%.*}" >> "$GITHUB_OUTPUT"

      - name: oasdiff breaking-change detection
        id: oasdiff
        continue-on-error: true
        uses: oasdiff/oasdiff-action/breaking@v1
        with:
          base: /tmp/base-openapi.json
          revision: openapi.json

      - name: Gate on CONTRACT_VERSION major bump
        run: |
          if [ "${{ steps.oasdiff.outcome }}" != "failure" ]; then
            echo "No breaking contract changes detected."
            exit 0
          fi
          if [ "${{ steps.base.outputs.pr_major }}" -gt "${{ steps.base.outputs.base_major }}" ]; then
            echo "Breaking change allowed: CONTRACT_VERSION major bumped (${{ steps.base.outputs.base_major }} -> ${{ steps.base.outputs.pr_major }})."
            exit 0
          fi
          echo "::error::Breaking openapi.json change without a CONTRACT_VERSION major bump. Either keep the change backward-compatible or bump CONTRACT_VERSION major in samba_service/_contract.py."
          exit 1
