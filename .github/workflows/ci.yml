name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "planning/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "planning/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "${{ matrix.python-version }}"

      - name: Install SAMBA and dev dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy samba/

      - name: Test with coverage (Ubuntu)
        if: runner.os == 'Linux'
        run: uv run pytest tests/ --cov=samba --cov=samba_cli --cov=samba_service --cov-report=xml -q

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: uv run pytest tests/ -q

      - name: Upload coverage report
        if: runner.os == 'Linux' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  ui:
    name: UI (types, lint, unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      # Drift gate: regenerate TypeScript from the committed JSON Schemas and fail
      # on any diff. (The schemas-vs-Pydantic-models drift is covered by the
      # `test_schema_export` test in the backend job above.)
      - name: Generated-types drift gate
        run: |
          npm run gen:types
          git diff --exit-code -- src/api/generated
        working-directory: ui

      - name: Lint (eslint)
        run: npm run lint
        working-directory: ui

      - name: Type check (vue-tsc)
        run: npx vue-tsc --noEmit
        working-directory: ui

      - name: Unit tests (vitest)
        run: npm test
        working-directory: ui
